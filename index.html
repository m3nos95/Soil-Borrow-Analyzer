<div id="root"></div>
<script type="text/babel">

const { useState, useRef } = React;

const TYPE_COLORS = { A:"#f59e0b", B:"#3b82f6", C:"#10b981", D:"#8b5cf6", F:"#f97316" };
const TYPE_LABELS = { A:"Embankment", B:"Special Fill", C:"Backfill", D:"Cement Stab.", F:"Common Borrow" };

// ── Single likely AASHTO class from field AI observations ─────────────────────
function inferAASHTO(finesEst, plasticityIndicators, visualObservations) {
  const f = (finesEst||"").toLowerCase();
  const p = (plasticityIndicators||"").toLowerCase();
  const v = (visualObservations||"").toLowerCase();
  const highPlasticity = p.includes("high");
  const modPlasticity  = p.includes("moderate");
  const veryHighFines  = f.includes("very high");
  const highFines      = f.includes("high") && !veryHighFines;
  const modFines       = f.includes("moderate");
  const lowFines       = f.includes("low");

  // A-1-b signals: crusher run, stone dust, coarse sand, angular particles,
  // grey/dark aggregate colour, gravel, crushed stone — non-plastic, low fines
  const coarseAggregate =
    v.includes("crush") || v.includes("stone dust") || v.includes("angular") ||
    v.includes("gravel") || v.includes("coarse sand") || v.includes("coarse") ||
    v.includes("aggregate") || v.includes("dark grey") || v.includes("grey aggr") ||
    v.includes("limestone") || v.includes("granite") || v.includes("trap rock");

  if(highPlasticity) {
    return veryHighFines || highFines ? "A-7-6" : "A-6";
  }
  if(modPlasticity) {
    return veryHighFines || highFines ? "A-6" : "A-2-6";
  }
  // Non-plastic or low plasticity
  if(veryHighFines) return "A-4";
  // If coarse aggregate signals are present, override moderate/high fines estimate
  // (AI often overestimates fines for dark clean aggregate — coarseAggregate wins)
  if(highFines)     return coarseAggregate ? "A-1-b" : "A-2-4";
  if(modFines)      return coarseAggregate ? "A-1-b" : "A-2-4";
  if(lowFines) {
    // A-1-b: coarse sand / crusher run, low fines, non-plastic
    // A-3:   fine sand, non-plastic (no coarse aggregate signals)
    return coarseAggregate ? "A-1-b" : "A-3";
  }
  // Ambiguous fines — if clearly coarse aggregate, lean A-1-b
  return coarseAggregate ? "A-1-b" : "A-2-4";
}

// AASHTO rating descriptions
const AASHTO_RATINGS = {
  "A-1-a":"Excellent — well-graded gravel/sand",
  "A-1-b":"Excellent — coarse sand",
  "A-3":  "Good — fine sand, non-plastic",
  "A-2-4":"Good — granular w/ silty fines",
  "A-2-5":"Good — granular w/ silty fines (high LL)",
  "A-2-6":"Fair — granular w/ clayey fines",
  "A-2-7":"Fair — granular w/ plastic fines",
  "A-4":  "Fair — silty soil",
  "A-5":  "Fair — silty soil (high LL)",
  "A-6":  "Poor — clayey soil",
  "A-7-5":"Poor — elastic clay",
  "A-7-6":"Poor — plastic clay",
};

// T99 Standard Proctor estimated ranges by AASHTO class
// Source: AASHTO M 145, FHWA NHI-06-088, typical published ranges
// mdd = max dry density pcf, omc = optimum moisture content %
const T99_PROCTOR = {
  "A-1-a":{ mddLo:125, mddHi:135, omcLo:7,  omcHi:11, note:"Well-graded gravel — high density, low OMC" },
  "A-1-b":{ mddLo:120, mddHi:135, omcLo:8,  omcHi:12, note:"Coarse sand/crusher run — high density" },
  "A-3":  { mddLo:110, mddHi:120, omcLo:10, omcHi:14, note:"Fine sand — uniform, lower density" },
  "A-2-4":{ mddLo:115, mddHi:130, omcLo:9,  omcHi:14, note:"Silty granular — wide density range" },
  "A-2-5":{ mddLo:110, mddHi:125, omcLo:10, omcHi:15, note:"High LL silty granular" },
  "A-2-6":{ mddLo:115, mddHi:130, omcLo:9,  omcHi:14, note:"Clayey granular — similar to A-2-4" },
  "A-2-7":{ mddLo:110, mddHi:125, omcLo:11, omcHi:16, note:"Plastic fines — higher OMC" },
  "A-4":  { mddLo:100, mddHi:115, omcLo:13, omcHi:18, note:"Silt — moderate density, higher OMC" },
  "A-5":  { mddLo:90,  mddHi:105, omcLo:15, omcHi:22, note:"Elastic silt — low density, high OMC" },
  "A-6":  { mddLo:100, mddHi:115, omcLo:13, omcHi:20, note:"Lean clay — variable, moisture sensitive" },
  "A-7-5":{ mddLo:85,  mddHi:105, omcLo:16, omcHi:26, note:"Elastic clay — low density, very high OMC" },
  "A-7-6":{ mddLo:85,  mddHi:100, omcLo:18, omcHi:30, note:"Plastic clay — lowest density, highest OMC" },
};
function getProctor(aashtoClass) {
  return T99_PROCTOR[aashtoClass] || null;
}

// ── Deterministic AASHTO classifier per Table 5.1 (AASHTO M145) ──────────────
// Classification proceeds left-to-right: first group whose criteria are ALL met.
function computeAASHTO({ p200, p40, p10, ll, pi }) {
  const p200n = parseFloat(p200) || 0;
  const p40n  = parseFloat(p40)  || 0;
  const p10n  = parseFloat(p10)  || null;  // null = not entered, skip A-1-a #10 check
  const lln   = (ll==="NV"||ll==="NP"||ll==="") ? 0   : parseFloat(ll)||0;
  const pin   = (pi==="NP"||pi==="")             ? 0   : parseFloat(pi)||0;
  const isNP  = (pi==="NP"||pi==="");

  if(p200n <= 35) {
    // ── Granular (≤35% passing #200) ──────────────────────────────────────
    // A-1-a: #10≤50, #40≤30, #200≤15, PI≤6
    // Only use #10 check if #10 was actually entered
    const p10ok = (p10n === null) ? true : (p10n <= 50);
    if(p10ok && p40n <= 30 && p200n <= 15 && pin <= 6) return "A-1-a";

    // A-1-b: #40≤50, #200≤25, PI≤6
    if(p40n <= 50 && p200n <= 25 && pin <= 6) return "A-1-b";

    // A-3: #40≥51, #200≤10, NP  (fine sand — must be truly non-plastic)
    if(p40n >= 51 && p200n <= 10 && isNP) return "A-3";

    // A-2 subgroups (granular with fines 10-35%)
    // LL and PI apply to fraction passing #40
    if(lln <= 40 && pin <= 10) return "A-2-4";
    if(lln >= 41 && pin <= 10) return "A-2-5";
    if(lln <= 40 && pin >= 11) return "A-2-6";
    return "A-2-7";  // LL≥41, PI≥11

  } else {
    // ── Silt-Clay (>35% passing #200) ─────────────────────────────────────
    if(lln <= 40 && pin <= 10) return "A-4";
    if(lln >= 41 && pin <= 10) return "A-5";
    if(lln <= 40 && pin >= 11) return "A-6";
    // A-7: LL≥41, PI≥11
    // A-7-5 if PI ≤ LL-30  (plastic limit > 30, low shrink-swell)
    // A-7-6 if PI > LL-30  (plastic limit < 30, high shrink-swell)
    if(pin <= lln - 30) return "A-7-5";
    return "A-7-6";
  }
}

// ── Group Index calculation ────────────────────────────────────────────────────
// GI = (F-35)[0.2 + 0.005(LL-40)] + 0.01(F-15)(PI-10)
// For A-2-6 and A-2-7: use only second term: GI = 0.01(F-15)(PI-10)
// Partial values <0 treated as 0. Final GI rounded to nearest integer, min 0.
function computeGI({ p200, ll, pi }, aashtoClass) {
  const F   = parseFloat(p200) || 0;
  const lln = (ll==="NV"||ll==="NP"||ll==="") ? 0 : parseFloat(ll)||0;
  const pin = (pi==="NP"||pi==="")             ? 0 : parseFloat(pi)||0;

  const term2 = 0.01 * Math.max(F-15, 0) * Math.max(pin-10, 0);

  if(aashtoClass === "A-2-6" || aashtoClass === "A-2-7") {
    return Math.round(Math.max(term2, 0));
  }
  const term1 = Math.max(F-35, 0) * (0.2 + 0.005 * Math.max(lln-40, 0));
  return Math.round(Math.max(term1 + term2, 0));
}

// ── Section 1001 Compliance Engine ───────────────────────────────────────────
function checkCompliance(f) {
  const llNum  = (f.ll==="NV"||f.ll==="NP"||f.ll==="") ? 0 : parseFloat(f.ll)||0;
  const piNum  = (f.pi==="NP"||f.pi==="")              ? 0 : parseFloat(f.pi)||0;
  const p200n  = Math.round(parseFloat(f.p200)||0);
  const p1n    = Math.round(parseFloat(f.p1inch)||0);
  const p2n    = Math.round(parseFloat(f.p2half)||0);
  const p3n    = Math.round(parseFloat(f.p3inch)||0);
  const mdd    = parseFloat(f.maxDryDensity)||90;
  const general = llNum<=40 && f.noOrganics && f.noBoulders && mdd>=90;

  return {
    A:{ label:"Embankment", checks:[
      {label:'2½" — 95–100%', pass:p2n>=95&&p2n<=100, value:`${f.p2half}%`},
      {label:"#200 ≤ 35%",   pass:p200n<=35,          value:`${f.p200}%`},
      {label:"PI ≤ 8",       pass:piNum<=8,            value:f.pi},
      {label:"General",      pass:general,             value:""},
    ]},
    B:{ label:"Special Fill", checks:[
      {label:'3" — 100%',   pass:p3n===100,          value:`${f.p3inch}%`},
      {label:"#200 0–4%",   pass:p200n>=0&&p200n<=4, value:`${f.p200}%`},
      {label:"PI ≤ 8",      pass:piNum<=8,           value:f.pi},
      {label:"General",     pass:general,            value:""},
    ]},
    C:{ label:"Backfill", checks:[
      {label:'1" — 85–100%', pass:p1n>=85&&p1n<=100, value:`${f.p1inch}%`},
      {label:"#200 ≤ 25%",   pass:p200n<=25,         value:`${f.p200}%`},
      {label:"PI ≤ 8",       pass:piNum<=8,          value:f.pi},
      {label:"General",      pass:general,           value:""},
    ]},
    D:{ label:"Cement Stab.", checks:[
      {label:'3" — 100%',    pass:p3n===100,              value:`${f.p3inch}%`},
      {label:"#200 8–30%",   pass:p200n>=8&&p200n<=30,    value:`${f.p200}%`},
      {label:"PI — N/A",     pass:true,                   value:"N/A"},
      {label:"General",      pass:general,                value:""},
    ]},
    F:{ label:"Common Borrow", checks:[
      {label:"No #200 limit", pass:true,       value:"N/A"},
      {label:"PI ≤ 15",       pass:piNum<=15,  value:f.pi},
      {label:"General",       pass:general,    value:""},
    ]},
  };
}

Object.entries && Object.fromEntries;
function finalizeResults(types) {
  const out = {};
  for(const [k,v] of Object.entries(types)) {
    out[k] = {...v, pass: v.checks.every(c=>c.pass)};
  }
  return out;
}

// ── Confidence Tier ───────────────────────────────────────────────────────────
function getTier(pct) {
  if(pct>=75) return {label:"PROVISIONALLY APPROVED", color:"#10b981", bg:"#0a3728", border:"#0f5c3c", icon:"✓", action:"Material may be placed. Confirm with lab test."};
  if(pct>=50) return {label:"HOLD — LAB REQUIRED",    color:"#f59e0b", bg:"#271c00", border:"#a45c0a", icon:"⚠", action:"Ambiguous. Do not place until lab confirms."};
  return        {label:"FIELD REJECT",                color:"#ef4444", bg:"#2a0f0f", border:"#991b1b", icon:"✗", action:"Does not appear to meet requirements. Remove from site."};
}

// ── Vision Prompt ─────────────────────────────────────────────────────────────
const VISION_PROMPT = `You are an expert geotechnical materials inspector for the Delaware Department of Transportation (DelDOT). Analyze this photograph of a soil/borrow sample spread on a metal laboratory tray.

═══════════════════════════════════════
STEP 1 — COLOR AND ORGANIC ASSESSMENT
═══════════════════════════════════════

FIRST examine the overall soil color carefully before scoring anything else.

HARD AGGREGATE EXCEPTION — CHECK THIS BEFORE APPLYING ANY ORGANIC FLAG:
Before flagging any dark material as organic, determine if it is CRUSHED STONE / QUARRY SCREENINGS:
- Basalt, granite, and trap rock screenings (#10 stone dust, crusher run) are often very dark grey or near-black
- These are ACCEPTABLE borrow materials and must NOT be flagged as organic
- Signs you are looking at hard aggregate, NOT organic soil:
  → Particles are uniform in size and shape — angular, sharp-edged, faceted faces visible
  → Surface texture is gritty and hard-looking, not soft or mottled
  → Color is UNIFORM throughout — no patchwork of dark and light zones
  → No fluffy, spongy, or fibrous texture
  → Material looks like it came from a quarry, not a field or swamp
- If material meets these criteria: organicsDetected=false, blackSoilDetected=false, score normally as aggregate
- Type B (Special Fill) is the most likely classification for washed clean dark aggregate

BLACK OR VERY DARK SOIL — ORGANIC FLAG (applies only if Hard Aggregate Exception does NOT apply):
- If the soil is BLACK, near-black, very dark brown/grey, or has a dark organic appearance AND does not look like quarry aggregate:
  → organicsDetected MUST be true
  → ALL confidence scores MUST be capped at 40% maximum
  → blackSoilDetected MUST be true
  → This material REQUIRES lab testing — it cannot be provisionally approved
  → Dark color strongly indicates organic content which disqualifies all borrow types
  → Note: wet soil is darker than dry — look for uniformly dark color, not just surface moisture
  → Organic indicators: mottled/patchy color, soft or fluffy texture, fibrous material, uneven particle distribution

ACCEPTABLE COLORS for borrow — tan, beige, light brown, grey, light grey, yellow-brown, red-brown, orange-brown, off-white, dark grey uniform aggregate. These are clean mineral soils.

SUSPICIOUS COLORS requiring elevated scrutiny — dark brown, olive, greenish, very dark grey with mottled texture. Flag but don't automatically reject.

═══════════════════════════════════════
STEP 3 — LUMP AND CLUMP ANALYSIS
═══════════════════════════════════════

You must distinguish between FRIABLE AGGREGATIONS and TRUE COHESIVE LUMPS. Color alone is NOT enough — assess surface texture.

FRIABLE AGGREGATIONS — NOT a cohesion penalty:
- Surface appears ROUGH and GRANULAR — individual grains visible on lump surface
- Jagged, crumbly edges — loosely bonded grains held by moisture or drying
- Would break apart freely between fingers with no resistance
- Common in ANY sandy or silty soil after sampling or drying
- Light tan/beige/off-white soils almost always form this type — NOT cohesive clay
- DO NOT penalize — says nothing about PI or plasticity

TRUE COHESIVE CLAY LUMPS — apply cohesion penalty:
- Surface SMOOTH and DENSE — no visible individual grains on surface
- Looks compressed, waxy, or plastic in appearance
- Would be moldable/sticky when wet
- Usually found in darker soils (brown, grey, olive)

SOIL COLOR PRIOR:
- LIGHT TAN / BEIGE / OFF-WHITE → LOW probability of true cohesion. Lumps are almost always friable aggregations. Delaware coastal plain soils in these colors are commonly non-plastic.
- MEDIUM BROWN / RED-BROWN → MODERATE. Evaluate texture carefully.
- DARK BROWN / GREY / OLIVE → HIGHER. More likely true clay behavior.

STONE / AGGREGATE — positive indicator:
- Color clearly different from surrounding soil, visible mineral faces or crystal structure

═══════════════════════════════════════
STEP 2 — AASHTO VISUAL CLASSIFICATION GUIDE
═══════════════════════════════════════

Use the following physical descriptions to determine the most likely AASHTO class BEFORE scoring borrow types.
Match color, texture, particle visibility, and wet/dry behavior to the descriptions below.

A-1-a / A-1-b (Granular — clean coarse material):
- Individual gravel/sand particles clearly visible and distinguishable by eye
- A-1-a: gravel-dominated, coarser, heterogeneous mix of stone fragments 2–75mm
- A-1-b: sandier/finer, but still gritty with visible individual grains
- Drains instantly, zero stickiness or molding ability, no dust or mud, loose and free-flowing
- Dry: gritty, rough, particles of varying sizes packed together — like crushed stone base
- Wet: drains immediately, cannot mold or roll — behaves like loose aggregate
- Fines: ≤15–25% passing #200
- KEY SIGNAL: if you can see individual particles clearly with open voids → A-1

A-3 (Fine Sand):
- Uniform fine-grained, light-colored (tan, yellow, white) — like beach or dune sand
- Dry: tiny grains just visible, smooth flowing powder that pours like sugar, silky-gritty, non-cohesive
- Wet: stays loose, drains quickly, zero plasticity — cannot roll into thread or mold
- Looks and feels like clean playground sand that slips through fingers
- No large particles, no clumping, no fines coating
- Fines: trace to none, mostly passing #40 but retained on #200

A-2-4 / A-2-5 / A-2-6 / A-2-7 (Dirty granular — transitional):
- Looks like A-1 but with noticeable dusty or slightly cohesive fines coating the grains
- Gravel/sand particles still VISIBLE but mix feels powdery or floury from fines
- Dry: may form weak clumps, but grains still distinguishable
- Wet: mild plasticity/stickiness (more in A-2-6/7), drains reasonably well, not thick mud
- A-2-4/5: silty fines, lower plasticity — feels dusty/powdery
- A-2-6/7: clayey fines, more sticky — feels gritty with a clay coating
- Fines: ≤35% passing #200

A-4 (Silty Soils):
- Fine powdery flour or talcum powder — NO visible sand or gravel grains to naked eye
- Dry: light-colored (gray/yellow), soft, dusty — a handful puffs into air
- Wet: slippery and slick like wet flour paste — can smear but CANNOT roll thin thread
- Holds water but drains slowly, feels smooth not gritty, not very sticky
- Fines: ≥36% passing #200, PI ≤10
- KEY SIGNAL: uniform powder with NO visible particles → A-4 or higher

A-5 (Elastic Silty Soils):
- Very light, fluffy, or spongy silt — pale gray/white/yellow with silky sheen
- Dry: extremely soft and powdery, like cornstarch or diatomaceous earth, compresses easily
- Wet: ELASTIC — bounces back slightly when pressed, feels rubbery or greasy/slick
- Can be molded but springs back — feels "fluffy" or voluminous even when moist
- Distinguished from A-4 by springy/elastic wet behavior

A-6 (Lean Clay):
- Smooth homogeneous clay mass — NO visible sand/gravel
- Dry: hard blocky clods that CRACK and break apart — reddish/gray/brown color
- Wet: PLASTIC and STICKY — can roll into thread, mold like putty, smooth and greasy between fingers
- Sticks to tools/hands, holds shape when molded, dries to hard cracked blocks
- Classic "sticky clay" — like potting soil or riverbank mud
- Fines: ≥36% passing #200, PI ≥11
- KEY SIGNAL: can roll wet soil into a thin thread without breaking → A-6 or A-7

A-7-5 / A-7-6 (Highly Plastic Clay):
- Dense smooth uniform clay — ZERO visible coarse grains
- Dry: VERY HARD, shiny, cracked clods/crusts (dark gray/brown/red) — difficult to break by hand
- Shrinks dramatically when drying — DEEP cracks form
- Wet: extremely sticky, greasy, HIGHLY moldable — like thick putty or chewing gum
- Can roll LONG THIN THREADS that bend without cracking — clings tenaciously to skin/tools
- A-7-5: slightly spongy/elastic wet behavior
- A-7-6: stickiest and most "gummy" — most extreme plasticity
- KEY SIGNALS (field): hard angular dry chunks with shrinkage cracks + waxy lump faces = A-7
- KEY SIGNALS (lab pulverized): looks identical to A-4 — CANNOT be distinguished visually once dried/pulverized

IMPORTANT LIMITATIONS FOR LAB PULVERIZED/DRIED SAMPLES:
- A-4 vs A-7 CANNOT be reliably distinguished once a sample is dried and pulverized
- If you see uniform fine powder with no clods → conservatively call A-4 (correct safe default)
- Only field-state samples with intact clods allow A-6/A-7 identification
- Hard angular dry chunks from field samples WITH shrinkage cracks → likely A-7
- Soft moist smearing clods from field samples → likely A-6

═══════════════════════════════════════
STEP 4 — BORROW TYPE SCORING
═══════════════════════════════════════

Use ONLY these fixed score values. Do not use any other numbers.
Pick the single best score from each bin based on what you observe.

SCORE BINS: 0 / 15 / 30 / 45 / 60 / 75 / 85 / 95

TYPE F (Common Borrow — least restrictive, PI ≤ 15, no #200 limit):
- 95 → clean mineral soil, good color, no organics, no issues
- 85 → clean soil, minor concerns (slight darkness, minor moisture)
- 60 → some organic indicators or borderline color
- 30 → significant organic concern
- 0  → black soil / obvious organics

TYPE A (Embankment — max 35% #200, PI ≤ 8):
- 85 → sandy/gravelly, clearly limited fines, no cohesion, individual grains dominate
- 75 → mostly granular, some fines visible, no clay behavior
- 60 → moderate fines coat particles but granular texture still present
- 45 → significant fines, surface powdery, approaching 35% #200 visually
- 30 → clearly very high fines OR true cohesive lumps present
- 15 → fine powder dominates, likely >35% #200
- 0  → obvious clay / organics

TYPE C (Backfill — max 25% #200, PI ≤ 8):
- 85 → mostly granular, individual grains clearly visible, low-moderate fines, no cohesion
- 75 → granular with moderate fines, no clay behavior, friable aggregations only
- 60 → moderate fines, borderline 25% #200 visually
- 45 → fines content looks close to or above 25%
- 30 → clearly above 25% fines OR any true cohesive clay lumps
- 0  → high fines / clay / organics

TYPE D (Cement Stabilization — 8-30% #200):
NOTE: Type D has a fines WINDOW, not just a maximum. It is NOT part of the B→C→A→F hierarchy.
A soil that passes Type C (≤25% #200) and fails Type B (>4% #200) very likely passes Type D.
- 85 → clearly silty-sandy with moderate fines, visually fits 8-30% range well
- 75 → moderate fines present, consistent with 8-30% range
- 45 → fines appear too low (<8%, very clean sand) or too high (>30%, very dusty/silty)
- 15 → clearly outside 8-30% range
- 0  → not suitable

TYPE B (Special Fill — ONLY 0-4% #200, WASHED CLEAN AGGREGATE):
- 75 → clearly crushed aggregate: individual particles visible and countable, open voids between particles, no fines matrix, mineral faces visible, dark gray uniform angular particles with no dust coating
- 45 → likely clean aggregate: particles visible but slight dusty haze, may have trace fines dust on surfaces
- 15 → possibly clean aggregate: some particles visible but moderate dust present, borderline
- 0  → ANY natural-looking soil, any powdery/dusty matrix filling voids, particles NOT individually visible = 0
       Key test: IF you can clearly see and count individual particles with OPEN VOIDS = likely passes Type B → score 45-75
       IF particles are coated in fines/dust or voids are filled = 0

═══════════════════════════════════════
CRITICAL RULES — NON-NEGOTIABLE
═══════════════════════════════════════
1. HARD AGGREGATE EXCEPTION — Check FIRST: uniform dark angular crushed stone (basalt, granite, trap rock screenings) is NOT organic. Do NOT set organicsDetected or blackSoilDetected for quarry aggregate. Score it normally.
2. BLACK SOIL (non-aggregate) → organicsDetected=true, blackSoilDetected=true, ALL scores ≤ 40%, material cannot provisionally pass
3. LIGHT TAN/BEIGE soil with rough-surfaced lumps = FRIABLE AGGREGATIONS, NOT cohesive clay, NO penalty
4. Only penalize cohesion when you clearly see SMOOTH DENSE lump surfaces indicating true plasticity
5. PARTICLE VISIBILITY RULE — If individual particles are clearly visible and countable with open voids between them: fines = LOW or VERY LOW. NEVER estimate "moderate" or "high" fines when particles are individually visible.
6. DARK GRAY ANGULAR AGGREGATE RULE — Dark gray uniform angular particles where you can see individual grains = A-1-b crusher run, NOT A-2-4. Fines <4% if voids are open.
7. Type B VISIBILITY TEST — Can you see individual particles clearly with open voids? YES → score 45-75 for Type B. NO (dusty/filled voids) → score 0.
8. Type F should almost always be highest confidence for any clean non-black soil
9. Do not over-penalize sandy/silty soils — Delaware coastal plain soils are commonly non-plastic

═══════════════════════════════════════
QUARTER SIZE REFERENCE — PRESENT IN PHOTO 2 (CLOSE-UP)
═══════════════════════════════════════
A US quarter coin has a diameter of exactly 24.26mm (about 1 inch).
The quarter appears in Photo 2 (close-up), placed directly on the sample surface.
Use the coin edge in Photo 2 to:
- Compare particle sizes directly to the quarter diameter
- Estimate dominant particle size in mm: >24mm = gravel, 5-24mm = coarse gravel/pebble, 2-5mm = fine gravel, 0.5-2mm = coarse sand, 0.1-0.5mm = medium/fine sand, <0.1mm = silt/fines
- Use this to override any color-based fines estimate
- If particles are clearly much smaller than the quarter → likely sand or finer
- If particles are 1/10th of quarter size or less → likely fine sand or silt
- Populate particleSizeEstimate with your calibrated estimate

═══════════════════════════════════════
WET SPOT INTERPRETATION — IF PRESENT IN PHOTO 2
═══════════════════════════════════════
Photo 3 (when provided) shows a wet zone where 6-8 drops of water were applied to the sample.
This is your PRIMARY plasticity indicator — more reliable than any dry visual cue.

Interpret the wet zone as follows:
- Water beads on surface / instant drainage / stays loose and granular → NON-PLASTIC. A-1 or A-3. High confidence Type B/C possible.
- Water soaks in quickly but material stays loose/crumbly → NON-PLASTIC to LOW. A-2 or A-3. 
- Water absorbed, forms a slick or shiny wet patch, material smears but will NOT hold a shape or roll into thread → LOW plasticity. A-4 silt. PI likely ≤10. Type B/C unlikely.
- Wet zone becomes sticky, holds its shape, can be molded, feels like clay → MODERATE plasticity. A-6. PI likely 11-30. Type A/F only.
- Wet zone becomes extremely sticky, gummy, clings to surfaces, highly moldable like putty/chewing gum → HIGH plasticity. A-7. PI likely >30. Type F borderline, possibly reject.
- Wet zone appears elastic/spongy, bounces back when pressed → A-5 or A-7-5. Micaceous or elastic silt.

IMPORTANT: If wet behavior indicates moderate or high plasticity, this OVERRIDES any dry-photo assessment.
If wet behavior indicates non-plastic, BOOST Type B and C confidence accordingly.
Always populate the wetBehavior field describing exactly what you observe in the wet zone.

Respond ONLY with valid JSON, no markdown, no explanation outside the JSON:
{"visualObservations":"3-4 sentence description covering color, texture, lump analysis, fines content, and quarter-based particle size estimate","estimatedFinesContent":"low (<10%) / moderate (10-25%) / high (25-35%) / very high (>35%)","plasticityIndicators":"non-plastic / low / moderate / high","wetBehavior":"IF wet spot photo provided: describe exactly what happened — beads/instant drain (A-1), soaks loose (A-3/A-2), slick paste no thread (A-4), sticky moldable (A-6), extremely sticky gum-like (A-7). If no wet photo: omit this field.","particleSizeEstimate":"IF quarter visible: estimate dominant particle size range in mm using the 24.26mm quarter as reference (e.g. 0.1-0.5mm fine sand, 0.5-2mm medium sand, 2-5mm fine gravel, 5-20mm gravel). If no quarter: omit this field.","organicsDetected":false,"blackSoilDetected":false,"bouldersDetected":false,"lumpAnalysis":"description of lumps/clumps seen — color-matched cohesive or color-varied aggregate, proportion of each","confidences":{"A":0,"B":0,"C":0,"D":0,"F":0},"primaryRecommendation":"TYPE X","reasoning":"2-3 sentence explanation referencing wet behavior if available, particle size if quarter present, and why each type scored as it did"}`;

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey]       = useState("");
  const [tab, setTab]             = useState("field");
  const [photos, setPhotos] = useState([]);  // [{file, preview}] up to 3

  const [scanning, setScanning]   = useState(false);
  const [scanStep, setScanStep]   = useState("");        // status message during scan
  const [visionResult, setVisionResult] = useState(null);
  const [visionError, setVisionError]   = useState(null);
  const [labResults, setLabResults]     = useState(null);
  const [saved, setSaved]         = useState(false);
  const [pdfParsing, setPdfParsing] = useState(false);
  const [pdfStatus,  setPdfStatus]  = useState(null);   // null | "success" | "error"
  const [pdfMsg,     setPdfMsg]     = useState("");
  const pdfRef = useRef();
  const [database, setDatabase]   = useState([]);
  const [dbMatches, setDbMatches] = useState([]);       // top database matches for this scan
  const [gps, setGps]             = useState(null);        // {lat, lng, accuracy, timestamp}
  const [gpsLoading, setGpsLoading] = useState(false);
  const fileRef = useRef();

  const [form, setForm] = useState({
    testNo:"", contract:"", contractor:"", location:"",
    sampledBy:"", dateSampled:"", submittedType:"",
    p3inch:"100", p2half:"", p1inch:"100",
    p38:"100", p4:"100", p10:"", p40:"", p200:"",
    ll:"", pi:"", maxDryDensity:"",
    noOrganics:true, noBoulders:true, notes:"", actualAASHTO:"",
  });

  const fld = (k,v) => setForm(f=>({...f,[k]:v}));

  const handlePhoto = e => {
    const files = Array.from(e.target.files);
    if(!files.length) return;
    setVisionResult(null); setVisionError(null);
    files.slice(0, 3 - photos.length).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => setPhotos(prev => {
        if(prev.length >= 3) return prev;
        return [...prev, {file, preview: ev.target.result}];
      });
      reader.readAsDataURL(file);
    });
    // reset input so same file can be re-added after removal
    e.target.value = "";
  };

  const removePhoto = idx => {
    setPhotos(prev => prev.filter((_,i) => i !== idx));
    setVisionResult(null);
  };

  const runVisionScan = async () => {
    if(!photos.length) return;
    if(!apiKey.trim()) { setVisionError("Please enter your Anthropic API key above before scanning."); return; }
    setScanning(true); setVisionResult(null); setVisionError(null); setDbMatches([]);

    try {
      // ── Resize helper ──────────────────────────────────────────────────────
      const resizeImage = (dataUrl, maxSize=1024) => new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxSize/Math.max(img.width, img.height));
          const canvas = document.createElement("canvas");
          canvas.width  = Math.round(img.width  * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/jpeg", 0.85));
        };
        img.src = dataUrl;
      });

      const mediaType = "image/jpeg";
      // Resize all photos — first is primary tray shot, rest are close-ups
      const resizedPhotos = await Promise.all(photos.map(p => resizeImage(p.preview)));
      const base64        = resizedPhotos[0].split(",")[1];  // primary for db compare

      // ── STEP 1: Database similarity match — FULL DATABASE SCAN ─────────────
      // Processes ALL saved entries in batches of 8, scores everything,
      // then feeds the top 3 matches as a weighted consensus into the main prompt.
      const candidates = database.filter(e => e.photo && e.labResults);
      let matchContext = "";
      const BATCH_SIZE = 8;  // images per comparison call (safe within API limits)

      if(candidates.length > 0) {
        const totalBatches = Math.ceil(candidates.length / BATCH_SIZE);
        setScanStep(`Scanning full database — ${candidates.length} sample${candidates.length>1?"s":""} in ${totalBatches} batch${totalBatches>1?"es":""}…`);

        // Score every candidate across all batches
        const allScores = []; // {entry, score, reasoning}

        for(let batchIdx = 0; batchIdx < totalBatches; batchIdx++) {
          const batch = candidates.slice(batchIdx * BATCH_SIZE, (batchIdx+1) * BATCH_SIZE);
          setScanStep(`Database scan — batch ${batchIdx+1} of ${totalBatches} (${candidates.length} total samples)…`);

          // Build multi-image comparison content
          const compContent = [
            {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
            {type:"text",  text:`This is the NEW sample to classify.

Below are ${batch.length} PREVIOUSLY CONFIRMED samples from the database (batch ${batchIdx+1} of ${totalBatches}).
Rate each database sample's VISUAL SIMILARITY to the NEW sample on a scale 0-100:
  100 = nearly identical (color, texture, gradation, fines content, particle shape)
  75  = very similar material type
  50  = same general category but differences
  25  = different material
  0   = completely different

Respond ONLY with valid JSON, no markdown:
{"similarities":[${batch.map((_,i)=>`{"index":${i},"score":0,"reasoning":"brief"}`).join(",")}]}`},
          ];

          // Interleave label + photo for each batch entry
          for(let i=0; i<batch.length; i++) {
            const c = batch[i];
            try {
              const thumb = await resizeImage(c.photo, 384);
              const tb64  = thumb.split(",")[1];
              const passT = Object.entries(c.labResults).filter(([,d])=>d.pass).map(([t])=>"Type "+t).join(",")||"NONE";
              compContent.splice(1+i*2, 0,
                {type:"text",  text:`DB[${i}] Test:${c.testNo||"—"} Pass:${passT} #200:${c.p200||"—"}% PI:${c.pi||"—"}`},
                {type:"image", source:{type:"base64", media_type:"image/jpeg", data:tb64}},
              );
            } catch(e) { /* skip unreadable photo */ }
          }

          try {
            const compRes = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "x-api-key": apiKey.trim(),
                "anthropic-version": "2023-06-01",
                "anthropic-dangerous-direct-browser-access": "true",
              },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 600,
                temperature: 0,
                messages: [{role:"user", content:compContent}],
              }),
            });
            const compData = await compRes.json();
            if(!compData.error && compRes.ok) {
              const raw    = compData.content?.find(b=>b.type==="text")?.text||"";
              const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
              parsed.similarities?.forEach(s => {
                if(s.score >= 35) {  // keep anything with meaningful similarity
                  allScores.push({
                    entry: batch[s.index],
                    score: s.score,
                    reasoning: s.reasoning,
                  });
                }
              });
            }
          } catch(e) { /* batch failed — continue */ }
        }

        // Sort ALL results by score, take top 3
        allScores.sort((a,b) => b.score - a.score);
        const top3 = allScores.slice(0, 3).filter(m => m.score >= 40);

        if(top3.length > 0) {
          // Store for UI display
          const uiMatches = top3.map(m => ({
            ...m.entry,
            similarityScore: m.score,
            similarityReason: m.reasoning,
          }));
          setDbMatches(uiMatches);

          // ── Build weighted consensus from top 3 ───────────────────────────
          // Weighted average of #200 and PI, weighted by similarity score
          let wSum=0, w200=0, wPI=0, wLL=0;
          const typeVotes = {A:0, B:0, C:0, D:0, F:0}; // weighted votes per type
          top3.forEach(m => {
            const w = m.score;
            wSum += w;
            const p200v = parseFloat(m.entry.p200);
            const piv   = parseFloat(m.entry.pi);
            const llv   = parseFloat(m.entry.ll);
            if(!isNaN(p200v)) w200 += p200v * w;
            if(!isNaN(piv))   wPI  += piv   * w;
            if(!isNaN(llv))   wLL  += llv   * w;
            // Accumulate pass/fail votes weighted by similarity
            Object.entries(m.entry.labResults||{}).forEach(([type,data]) => {
              if(typeVotes[type] !== undefined) {
                typeVotes[type] += data.pass ? w : -w;
              }
            });
          });
          const avg200 = wSum>0 ? (w200/wSum).toFixed(1) : "—";
          const avgPI  = wSum>0 ? (wPI/wSum).toFixed(1)  : "—";
          const avgLL  = wSum>0 ? (wLL/wSum).toFixed(1)  : "—";

          // Consensus pass/fail: positive vote = likely pass, negative = likely fail
          const consensusPass = Object.entries(typeVotes).filter(([,v])=>v>0).map(([t])=>"Type "+t).join(", ")||"NONE";
          const consensusFail = Object.entries(typeVotes).filter(([,v])=>v<=0).map(([t])=>"Type "+t).join(", ")||"NONE";

          // Individual match summaries
          const matchSummaries = top3.map((m,i) => {
            const pT = Object.entries(m.entry.labResults).filter(([,d])=>d.pass).map(([t])=>"Type "+t).join(",")||"NONE";
            const fT = Object.entries(m.entry.labResults).filter(([,d])=>!d.pass).map(([t])=>"Type "+t).join(",")||"NONE";
            return `  MATCH ${i+1} (${m.score}% similar) — Test ${m.entry.testNo||"—"} | #200:${m.entry.p200||"—"}% PI:${m.entry.pi||"—"} | PASS:${pT} FAIL:${fT}
    Reason: ${m.reasoning}`;
          }).join("\n");

          matchContext = `

═══════════════════════════════════════
DATABASE CONSENSUS — ${top3.length} SIMILAR SAMPLE${top3.length>1?"S":""} FOUND
(${candidates.length} total samples in database, full scan)
═══════════════════════════════════════
The ENTIRE database was scanned. The ${top3.length} most visually similar confirmed samples are shown below.
Use these as calibration anchors — the weighted consensus should strongly anchor your scoring.

WEIGHTED AVERAGES (weighted by visual similarity score):
  #200 passing: ${avg200}%
  Plasticity Index: ${avgPI}
  Liquid Limit: ${avgLL}

CONSENSUS CLASSIFICATION (weighted votes across all ${top3.length} matches):
  Likely PASS: ${consensusPass}
  Likely FAIL: ${consensusFail}

INDIVIDUAL MATCHES:
${matchSummaries}

SCORING INSTRUCTIONS:
- If top match ≥75% similar: weight your scores HEAVILY toward the consensus pass/fail pattern
- If top match 50-74% similar: use consensus as a strong soft anchor
- If top match 40-49% similar: use as weak guidance, rely more on visual analysis
- The weighted average #200 and PI are your best fines/plasticity estimates
- If all ${top3.length} matches agree on pass/fail for a type, treat that as near-certain`;
        }
      }

      // ── STEP 2: Main vision scoring ────────────────────────────────────────
      setScanStep("Running AI visual classification…");

      const finalPrompt = VISION_PROMPT + matchContext;

      // Build content array: all photos first, then the prompt
      // Photo 1 = full tray overview, Photo 2+ = close-ups
      const visionContent = resizedPhotos.map((r, i) => ({
        type: "image",
        source: {type:"base64", media_type:mediaType, data:r.split(",")[1]}
      }));
      // Label the photos in the prompt if more than one
      // Fixed slot order: 1=tray+quarter, 2=dry close-up, 3=wet spot
      let photoLabels = "";
      if(resizedPhotos.length === 1) {
        photoLabels = "\n\nNOTE: 1 photo provided — tray overview only. No wet spot photo present — you MUST set wetBehavior to \"none\" in your JSON response. Do NOT guess or infer plasticity from dry photos alone. For best accuracy add Photo 2 (close-up with quarter) and Photo 3 (wet spot).";
      } else {
        const slotDesc = resizedPhotos.map((_,i) => {
          if(i===0) return "Photo 1 = FULL TRAY OVERVIEW — full spread of sample on metal tray, shot from above. Assess overall color, uniformity, visible lump character, and general gradation.";
          if(i===1) return "Photo 2 = CLOSE-UP WITH QUARTER. A US quarter (24.26mm / about 1 inch diameter) has been placed directly on the sample surface. This is your PARTICLE SIZE REFERENCE — use the coin edge to estimate actual grain sizes in mm. Individual particles visible next to the quarter allow direct size calibration. Also assess texture, fines coating, and lump surface character from this close range.";
          if(i===2) return "Photo 3 = WET SPOT TEST. 6-8 drops of water were added to a corner of the tray and allowed to absorb for 15+ seconds before photographing. THIS IS YOUR PRIMARY PLASTICITY SIGNAL — more reliable than any dry visual cue. Analyze the wet zone carefully: water beading/instant drainage = non-plastic A-1; stays loose/crumbly = A-3 or A-2; forms a shiny slick paste that smears but will NOT roll into a thread = A-4 silt (PI≤10); becomes sticky and moldable like clay = A-6 (PI 11-30); becomes extremely sticky gummy putty-like = A-7 (PI>30). You MUST populate the wetBehavior field from this photo. This OVERRIDES any dry-photo plasticity assessment.";
          return `Photo ${i+1} = ADDITIONAL DETAIL shot.`;
        }).join(" ");
        if(resizedPhotos.length < 3) slotDesc += " NO WET SPOT PHOTO PROVIDED — you MUST set wetBehavior to \"none\" in your JSON. Do NOT infer plasticity from dry photos.";
        photoLabels = `\n\nPHOTO PROTOCOL: ${slotDesc} Synthesize ALL photos — Photo 3 wet spot is the definitive plasticity test when present.`;
      }
      visionContent.push({type:"text", text:finalPrompt + photoLabels});

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          temperature: 0,
          messages: [{role:"user", content:visionContent}],
        }),
      });

      const data = await res.json();

      if(data.error) {
        setVisionError(`API Error: ${data.error.type} — ${data.error.message}`);
        return;
      }
      if(!res.ok) {
        setVisionError(`Request failed (${res.status}): ${JSON.stringify(data)}`);
        return;
      }

      const raw   = data.content?.find(b=>b.type==="text")?.text || "";
      const clean = raw.replace(/```json|```/g,"").trim();

      try {
        const parsed = JSON.parse(clean);
        const c = parsed.confidences;

        // ── POST-PROCESSING RULES (unchanged) ─────────────────────────────
        if(parsed.blackSoilDetected || parsed.organicsDetected) {
          parsed.organicsDetected = true;
          parsed.blackSoilDetected = true;
          Object.keys(c).forEach(k => { c[k] = Math.min(c[k], 40); });
        }

        // ── WET BEHAVIOR post-processing ─────────────────────────────────
        const wetText = (parsed.wetBehavior||"").toLowerCase();
        const hasWetPhoto = resizedPhotos.length >= 3 && wetText.length > 10 && wetText !== "none";
        if(hasWetPhoto) {
          // Wet behavior is the most reliable plasticity signal — override AI plasticity estimate
          const wetBeads       = wetText.includes("bead") || wetText.includes("drain") || wetText.includes("instant") || wetText.includes("runs off");
          const wetLoose       = wetText.includes("soak") || (wetText.includes("loose") && !wetText.includes("very"));
          const wetPaste       = wetText.includes("paste") || wetText.includes("slick") || (wetText.includes("smear") && !wetText.includes("sticky"));
          const wetSticky      = wetText.includes("stick") || wetText.includes("moldable") || wetText.includes("plastic") || wetText.includes("thread");
          const wetVerySticky  = wetText.includes("gum") || wetText.includes("extremely sticky") || wetText.includes("gummy") || wetText.includes("putty");

          if(wetBeads) {
            // A-1 or A-3 — definitely non-plastic, boost B and C
            parsed.plasticityIndicators = "non-plastic";
            c.B = Math.max(c.B, 60);
            c.A = Math.max(c.A, 85);
          } else if(wetLoose) {
            // A-2 or A-3 range
            parsed.plasticityIndicators = "non-plastic";
            c.A = Math.max(c.A, 75);
          } else if(wetPaste && !wetSticky) {
            // A-4 silt — smears but no thread → PI ≤10, penalize tight types
            parsed.plasticityIndicators = "low";
            c.B = Math.min(c.B, 5);
            c.C = Math.min(c.C, 45);
          } else if(wetVerySticky) {
            // A-7 — extremely sticky/gummy → high plasticity
            parsed.plasticityIndicators = "high";
            c.B = 0; c.C = Math.min(c.C, 15); c.A = Math.min(c.A, 30);
            parsed.cohesiveLumpsDetected = true;
          } else if(wetSticky) {
            // A-6 — sticky/moldable → moderate-high plasticity
            parsed.plasticityIndicators = "moderate";
            c.B = 0; c.C = Math.min(c.C, 20); c.A = Math.min(c.A, 45);
            parsed.cohesiveLumpsDetected = true;
          }
        }

        // ── PARTICLE SIZE post-processing ────────────────────────────────
        const sizeText = (parsed.particleSizeEstimate||"").toLowerCase();
        const hasQuarter = sizeText.length > 5;
        if(hasQuarter) {
          // Use quarter-calibrated size to override fines estimate
          const isFineSand    = sizeText.includes("0.1") || sizeText.includes("0.2") || sizeText.includes("fine sand");
          const isMedSand     = sizeText.includes("0.5") || sizeText.includes("1mm") || sizeText.includes("medium sand");
          const isCoarseSand  = sizeText.includes("2mm") || sizeText.includes("coarse sand");
          const isGravel      = sizeText.includes("gravel") || sizeText.includes("5mm") || sizeText.includes("10mm") || sizeText.includes("20mm");
          if(isGravel || isCoarseSand) {
            // Large particles confirmed by quarter — low fines almost certain
            if(!parsed.estimatedFinesContent?.toLowerCase().includes("low")) {
              parsed.estimatedFinesContent = "low (<10%)";
            }
          }
          if(isFineSand && !hasWetPhoto) {
            // Fine sand without wet test — could be A-3
            c.A = Math.max(c.A, 70);
          }
        }

        const finesEst = (parsed.estimatedFinesContent||"").toLowerCase();
        if(finesEst.includes("moderate") || finesEst.includes("high") || finesEst.includes("very high")) {
          c.B = Math.min(c.B, 5);
        } else if(finesEst.includes("low")) {
          c.B = Math.min(c.B, 30);
        }
        c.B = Math.min(c.B, c.C);
        if(c.B > 15 && c.C < 85) c.B = 15;

        const lumpText = (parsed.lumpAnalysis||"").toLowerCase();
        const visObs   = (parsed.visualObservations||"").toLowerCase();
        const trueCohesiveSignals =
          (lumpText.includes("smooth") && (lumpText.includes("dense") || lumpText.includes("plastic"))) ||
          lumpText.includes("true cohesive") || lumpText.includes("clay lump") ||
          (parsed.plasticityIndicators||"").toLowerCase().includes("moderate") ||
          (parsed.plasticityIndicators||"").toLowerCase().includes("high");
        const friableSignals =
          lumpText.includes("friable") || lumpText.includes("aggregation") ||
          lumpText.includes("rough") || lumpText.includes("granular surface") ||
          lumpText.includes("break") || lumpText.includes("crumbl");
        const lightSoilColor =
          visObs.includes("tan") || visObs.includes("beige") ||
          visObs.includes("off-white") || visObs.includes("pale") ||
          lumpText.includes("tan") || lumpText.includes("beige");
        const isTrueCohesive = trueCohesiveSignals && !friableSignals;

        if(isTrueCohesive && !lightSoilColor) {
          c.B = Math.min(c.B, 5);
          c.C = Math.min(c.C, Math.max(c.C - 20, 10));
          c.A = Math.min(c.A, Math.max(c.A - 15, 15));
          parsed.cohesiveLumpsDetected = true;
        } else if(isTrueCohesive && !friableSignals) {
          c.B = Math.min(c.B, 10);
          c.C = Math.min(c.C, Math.max(c.C - 8, 20));
          parsed.cohesiveLumpsDetected = true;
        }

        const finesEst2 = (parsed.estimatedFinesContent||"").toLowerCase();
        const plasticityOk = !(parsed.plasticityIndicators||"").toLowerCase().includes("high") &&
                             !(parsed.plasticityIndicators||"").toLowerCase().includes("moderate");
        const cleanSoil = !parsed.organicsDetected && !parsed.blackSoilDetected && !parsed.cohesiveLumpsDetected;

        if(cleanSoil && c.F >= 85) {
          if(finesEst2.includes("low")) { c.A = Math.max(c.A, 75); c.C = Math.max(c.C, 75); }
          else if(finesEst2.includes("moderate") && !finesEst2.includes("very")) { c.A = Math.max(c.A, 75); c.C = Math.max(c.C, 60); }
          else if(finesEst2.includes("high") && !finesEst2.includes("very") && plasticityOk) { c.A = Math.max(c.A, 60); }
        }

        if(c.B < 50 && c.C >= 75)       { c.D = Math.max(c.D, c.C); }
        else if(c.B < 75 && c.C >= 75)  { c.D = Math.max(c.D, Math.max(c.C - 10, 60)); }
        else if(c.C < 75 && c.A >= 75)  { c.D = Math.max(c.D, 60); }
        else if(c.B >= 75)              { c.D = Math.min(c.D, 20); }

        c.C = Math.max(c.C, c.B);
        c.A = Math.max(c.A, c.C);

          }}>
            <div style={{fontSize:12, fontWeight:600, letterSpacing:0}}>{label}</div>
            <div style={{fontSize:10, color:tab===k?"#64748b":"#64748b", letterSpacing:0}}>{sub}</div>
          </button>
        ))}

      {/* ── FIELD MODE ── */}
      {tab==="field" && (
        <div style={{display:"grid", gridTemplateColumns:"minmax(300px,1fr) minmax(300px,1fr)", gap:18, padding:18, maxWidth:1100, margin:"0 auto"}}>
          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            <PhotoPanel />
            <div style={card}>
              <div style={cHead}>SAMPLE ID (OPTIONAL)</div>
              <InfoFields fields={[["testNo","TEST NO."],["contract","CONTRACT"],["location","LOCATION"],["dateSampled","DATE"]]} />
              {/* GPS capture */}
              <div style={{padding:"0 16px 14px"}}>
                <div style={{fontSize:9,color:"#94a3b8",letterSpacing:0.3,marginBottom:6}}>GPS COORDINATES</div>

                  <button onClick={captureGPS} disabled={gpsLoading}

                    color:gpsLoading?"#64748b":"#4ade80",padding:"10px",
                    fontFamily:"inherit",fontWeight:700,fontSize:11,letterSpacing:0.3,
                    cursor:gpsLoading?"wait":"pointer",borderRadius:8,
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    {gpsLoading
                      ? <><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>◌</span> ACQUIRING GPS…</>

                  </button>
                ) : (
                  <div style={{background:"#0f2d1f",border:"1px solid #166534",borderRadius:8,padding:10}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                      {[
                        ["LATITUDE",  gps.lat+"° N"],
                        ["LONGITUDE", Math.abs(gps.lng)+"° W"],
                        ["ACCURACY",  gps.manual ? "manual entry" : "±"+gps.accuracy+" m"],
                        ["CAPTURED",  gps.timestamp],
                      ].map(([l,v])=>(
                        <div key={l} style={{background:"rgba(0,0,0,0.3)",borderRadius:6,padding:"5px 8px"}}>
                          <div style={{fontSize:8,color:"#4ade80",letterSpacing:0.3,marginBottom:1}}>{l}</div>
                          <div style={{fontSize:10,color:"#86efac",fontWeight:700}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <a href={gps.mapsUrl} target="_blank" rel="noopener noreferrer"

                        color:"#93c5fd",padding:"7px",fontFamily:"inherit",fontWeight:700,
                        fontSize:10,letterSpacing:0.3,cursor:"pointer",borderRadius:6,
                        textAlign:"center",textDecoration:"none",display:"block"}}>
                        🗺 VIEW ON MAP
                      </a>
                      <button onClick={captureGPS}
                        style={{flex:1,background:"#0f2d1f",border:"1px solid #166534",
                        color:"#4ade80",padding:"7px",fontFamily:"inherit",fontWeight:700,

            </div>
            <button onClick={runVisionScan} disabled={!photos.length||scanning} style={{

              border:"none", padding:"16px", fontFamily:"inherit", fontWeight:700,
              fontSize:14, letterSpacing:0.5, cursor:photos.length&&!scanning?"pointer":"default", borderRadius:8,
            }}>

            </button>
            <div style={{...card, borderColor:"#1a2a1a"}}>
              <div style={{...cHead, color:"#34d399"}}>THREE-TIER DECISION SYSTEM</div>
              <div style={{padding:16, fontSize:10, color:"#94a3b8", lineHeight:2}}>
                <div><span style={{color:"#10b981", fontWeight:700}}>≥ 75%</span> — PROVISIONALLY APPROVED</div>
                <div style={{paddingLeft:14, color:"#64748b", fontSize:9, marginBottom:6}}>Place material. Confirm with lab test.</div>
                <div><span style={{color:"#f59e0b", fontWeight:700}}>50 – 74%</span> — HOLD · LAB REQUIRED</div>
                <div style={{paddingLeft:14, color:"#64748b", fontSize:9, marginBottom:6}}>Ambiguous. Do not place until lab confirms.</div>
                <div><span style={{color:"#ef4444", fontWeight:700}}>&lt; 50%</span> — FIELD REJECT</div>
                <div style={{paddingLeft:14, color:"#64748b", fontSize:9}}>Remove from site. Does not appear to comply.</div>
              </div>
            </div>
          </div>

          <div style={{display:"flex", flexDirection:"column", gap:14}}>
            {visionError && <div style={{...card, background:"#2a0f0f", borderColor:"#991b1b", padding:16, color:"#f87171", fontSize:12}}>✗ {visionError}</div>}

            {scanning && (
              <div style={{...card, padding:60, textAlign:"center", color:"#94a3b8"}}>
                <div style={{fontSize:36, marginBottom:12, display:"inline-block", animation:"spin 1s linear infinite"}}>◌</div>
                <div style={{fontSize:11, letterSpacing:0.3, display:"block", color:"#f59e0b"}}>

                </div>
                <div style={{fontSize:9, color:"#64748b", marginTop:8, letterSpacing:0}}>
                  {database.filter(e=>e.photo&&e.labResults).length > 0
                    ? `STEP 1: FULL DB SCAN (${database.filter(e=>e.photo&&e.labResults).length} samples)  →  STEP 2: AI CLASSIFICATION`
                    : "EVALUATING TEXTURE · FINES · GRADATION · PLASTICITY"}
                </div>
              </div>
            )}

            {visionResult && !scanning && (
              <div className="fade-in" style={{display:"flex", flexDirection:"column", gap:14}}>
                {/* Observations */}
                <div style={card}>
                  <div style={cHead}>AI VISUAL OBSERVATIONS</div>
                  <div style={{padding:14}}>
                    <div style={{fontSize:11, color:"#94a3b8", lineHeight:1.8, marginBottom:12}}>{visionResult.visualObservations}</div>

                    {/* Black soil warning */}
                    {visionResult.blackSoilDetected && (
                      <div style={{background:"#1c0a00", border:"2px solid #7c2d12", borderRadius:10, padding:"10px 12px", marginBottom:12}}>
                        <div style={{fontSize:11, fontWeight:700, color:"#fb923c", letterSpacing:0}}>⚠ BLACK / DARK SOIL DETECTED</div>
                        <div style={{fontSize:10, color:"#9a3412", marginTop:4}}>Dark color indicates possible organic content. All types capped at 40% — lab testing required before any placement decision.</div>
                      </div>
                    )}

                    {/* Cohesive lumps warning */}
                    {visionResult.cohesiveLumpsDetected && (
                      <div style={{background:"#1a1200", border:"1px solid #854d0e", borderRadius:10, padding:"10px 12px", marginBottom:12}}>
                        <div style={{fontSize:11, fontWeight:700, color:"#ca8a04", letterSpacing:0}}>⚠ COHESIVE LUMPS DETECTED</div>
                        <div style={{fontSize:10, color:"#713f12", marginTop:4}}>Color-matched lumps indicate clay/silt binder presence. Confidence for tighter types reduced. Likely elevated PI.</div>
                      </div>
                    )}

                    {/* Lump analysis */}
                    {visionResult.lumpAnalysis && (
                      <div style={{background:"#0f172a", border:"1px solid #334155", padding:"8px 10px", borderRadius:8, marginBottom:12}}>
                        <div style={{fontSize:9, color:"#94a3b8", letterSpacing:0.3, marginBottom:4}}>LUMP / PARTICLE ANALYSIS</div>
                        <div style={{fontSize:11, color:"#64748b", lineHeight:1.6}}>{visionResult.lumpAnalysis}</div>
                      </div>
                    )}

                    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
                      {[
                        ["Est. Fines",    visionResult.estimatedFinesContent],
                        ["Plasticity",    visionResult.plasticityIndicators],
                        ["Organics",      visionResult.organicsDetected?"⚠ DETECTED — TEST REQUIRED":"✓ None observed"],
                        ['Boulders >6"',  visionResult.bouldersDetected?"⚠ DETECTED":"✓ None observed"],
                      ].map(([l,v])=>(
                        <div key={l} style={{background:"#0f172a", border:"1px solid #334155", padding:"8px 10px", borderRadius:8}}>
                          <div style={{fontSize:9, color:"#94a3b8", letterSpacing:0.3}}>{l}</div>
                          <div style={{fontSize:11, color:v?.includes("⚠")?"#f87171":"#94a3b8", marginTop:2}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    {/* Wet behavior — shown only when wet photo was provided */}
                    {visionResult.wetBehavior && (
                      <div style={{background:"#0a1628", border:"1px solid #1e3a5f", padding:"8px 10px", borderRadius:8, marginTop:8}}>
                        <div style={{fontSize:9, color:"#3b82f6", letterSpacing:0.3, marginBottom:3}}>💧 WET SPOT BEHAVIOR</div>
                        <div style={{fontSize:11, color:"#93c5fd", lineHeight:1.6}}>{visionResult.wetBehavior}</div>
                      </div>
                    )}
                    {/* Particle size — shown only when quarter was in photo */}
                    {visionResult.particleSizeEstimate && (
                      <div style={{background:"#0f1a0a", border:"1px solid #166534", padding:"8px 10px", borderRadius:8, marginTop:8}}>
                        <div style={{fontSize:9, color:"#4ade80", letterSpacing:0.3, marginBottom:3}}>🪙 PARTICLE SIZE (quarter-calibrated)</div>
                        <div style={{fontSize:11, color:"#86efac", lineHeight:1.6}}>{visionResult.particleSizeEstimate}</div>
                      </div>
                    )}
                  </div>
                </div>

                {/* Database Consensus Panel — top 3 matches from full scan */}
                {dbMatches.length > 0 && (() => {
                  let wSum=0, w200=0, wPI=0;
                  const tv={A:0,B:0,C:0,D:0,F:0};
                  dbMatches.forEach(m=>{
                    const w=m.similarityScore; wSum+=w;
                    const p=parseFloat(m.p200), pi=parseFloat(m.pi);
                    if(!isNaN(p)) w200+=p*w;
                    if(!isNaN(pi)) wPI+=pi*w;
                    Object.entries(m.labResults||{}).forEach(([t,d])=>{ if(tv[t]!==undefined) tv[t]+=d.pass?w:-w; });
                  });
                  const avg200=wSum>0?(w200/wSum).toFixed(1):"—";
                  const avgPI =wSum>0?(wPI/wSum).toFixed(1):"—";
                  const cPass=Object.entries(tv).filter(([,v])=>v>0).map(([t])=>"Type "+t).join(", ")||"NONE";
                  const cFail=Object.entries(tv).filter(([,v])=>v<=0).map(([t])=>"Type "+t).join(", ")||"—";
                  return (
                    <div style={{background:"#060f1e", border:"2px solid #1e3a5f", borderRadius:12, overflow:"hidden"}}>
                      <div style={{padding:"8px 14px", background:"#1e3a5f", fontSize:9, fontWeight:700, color:"#93c5fd", letterSpacing:0.3}}>
                        ◈ DATABASE CONSENSUS — {dbMatches.length} CLOSEST MATCH{dbMatches.length>1?"ES":""} · FULL DATABASE SCANNED
                      </div>
                      <div style={{padding:14}}>
                        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:12}}>
                          {[["WEIGHTED AVG #200",avg200+"%"],["WEIGHTED AVG PI",avgPI],["CONSENSUS PASS",cPass],["CONSENSUS FAIL",cFail]].map(([l,v])=>(
                            <div key={l} style={{background:"#0a1628", borderRadius:8, padding:"7px 10px", border:"1px solid #1e3a5f"}}>
                              <div style={{fontSize:8, color:"#475569", marginBottom:2, letterSpacing:0.3}}>{l}</div>
                              <div style={{fontSize:11, color:"#93c5fd", fontWeight:700}}>{v}</div>
                            </div>
                          ))}
                        </div>
                        {dbMatches.map((m,i)=>{
                          const pT=Object.entries(m.labResults||{}).filter(([,d])=>d.pass).map(([t])=>t).join("/");
                          const sc=m.similarityScore;
                          const col=sc>=75?"#34d399":sc>=50?"#f59e0b":"#94a3b8";
                          return (
                            <div key={m.id||i} style={{borderTop:"1px solid #1e3a5f", paddingTop:8, marginTop:8}}>
                              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4}}>
                                <span style={{fontSize:9, color:"#64748b"}}>#{i+1} · Test {m.testNo||"—"} · {m.contract||"—"}</span>
                                <span style={{fontSize:12, fontWeight:800, color:col}}>{sc}%</span>
                              </div>
                              <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:4, marginBottom:4}}>
                                {[["#200",m.p200?m.p200+"%":"—"],["PI",m.pi||"—"],["LL",m.ll||"—"],["PASS",pT||"—"]].map(([l,v])=>(
                                  <div key={l} style={{fontSize:9}}><span style={{color:"#334155"}}>{l}: </span><span style={{color:"#3b82f6"}}>{v}</span></div>
                                ))}
                              </div>
                              {m.similarityReason && <div style={{fontSize:9, color:"#334155", fontStyle:"italic", lineHeight:1.5}}>{m.similarityReason}</div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}

                {/* Confidence Matrix */}
                <div style={card}>
                  <div style={cHead}>FIELD DETERMINATION BY TYPE</div>
                  <div style={{padding:"8px 14px 0", fontSize:9, color:"#64748b", borderBottom:"1px solid #334155", paddingBottom:8, marginBottom:2}}>
                    Section 1001 hierarchy enforced: <span style={{color:"#94a3b8"}}>B (tightest) → C → A → F (loosest)</span>
                  </div>
                  <div style={{padding:16, display:"flex", flexDirection:"column", gap:8}}>
                    {Object.entries(visionResult.confidences).sort((a,b)=>b[1]-a[1]).map(([type,pct])=>{
                      const tier = getTier(pct);
                      const rawOrder = {B:0,C:1,A:2,F:3};
                      const tighterTypes = Object.entries(rawOrder).filter(([t,o])=>o < rawOrder[type]).map(([t])=>t);
                      const cascadedFrom = tighterTypes.find(t => visionResult.confidences[t] === pct && pct > 0);
                      return (
                        <div key={type} style={{border:`1px solid ${pct>=75?TYPE_COLORS[type]+"55":"#334155"}`, borderRadius:10, overflow:"hidden"}}>
                          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 12px", background:pct>=75?TYPE_COLORS[type]+"15":"#ffffff04"}}>
                            <div style={{display:"flex", alignItems:"center", gap:10}}>
                              <div style={{fontWeight:900, fontSize:20, color:pct>=75?TYPE_COLORS[type]:pct>=50?"#64748b":"#64748b", minWidth:20}}>{type}</div>
                              <div>
                                <div style={{fontSize:10, color:"#64748b", letterSpacing:0}}>{TYPE_LABELS[type].toUpperCase()}</div>
                                <div style={{fontSize:9, color:tier.color, letterSpacing:.5, marginTop:1}}>{tier.icon} {tier.label}</div>
                                {cascadedFrom && <div style={{fontSize:8, color:"#3b5268", marginTop:1, letterSpacing:.5}}>↑ cascaded from Type {cascadedFrom}</div>}
                              </div>
                            </div>
                            <div style={{width:80, height:8, background:"#0f172a", borderRadius:12, overflow:"hidden"}}>
                              <div style={{height:"100%", width:`${pct}%`, background:pct>=75?TYPE_COLORS[type]:pct>=50?"#f59e0b":"#64748b", borderRadius:12, transition:"width .6s ease"}} />
                            </div>
                          </div>
                          <div style={{padding:"4px 12px", fontSize:9, color:"#64748b"}}>{tier.action}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Verdict — all types get their status, ≥75% all light up green */}
                {(()=>{
                  const conf = visionResult.confidences;
                  const rec  = visionResult.primaryRecommendation?.replace("TYPE ","");
                  const recPct = conf[rec]||0;
                  const recTier = getTier(recPct);

                  // All types at ≥75% are provisionally approved
                  const approved = Object.entries(conf).filter(([,p])=>p>=75).map(([t])=>t);
                  const hold     = Object.entries(conf).filter(([,p])=>p>=50&&p<75).map(([t])=>t);
                  const rejected = Object.entries(conf).filter(([,p])=>p<50).map(([t])=>t);

                  return (
                    <div style={{display:"flex", flexDirection:"column", gap:10}}>

                      {/* ── Provisionally Approved ── */}
                      {approved.length > 0 && (
                        <div style={{background:"#0a3728", border:"2px solid #065f46", borderRadius:12, padding:14}}>
                          <div style={{fontSize:9, color:"#34d399", letterSpacing:0.5, marginBottom:10}}>✓ PROVISIONALLY APPROVED — CONFIRM WITH LAB</div>
                          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
                            {approved.map(t=>(
                              <div key={t} style={{padding:"8px 16px", borderRadius:8, background:TYPE_COLORS[t], color:"#0f172a", fontWeight:900, fontSize:14}}>
                                TYPE {t}
                                <div style={{fontSize:9, fontWeight:400, marginTop:2}}>{TYPE_LABELS[t]}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* ── Hold / Lab Required ── */}
                      {hold.length > 0 && (
                        <div style={{background:"#271c00", border:"2px solid #92400e", borderRadius:12, padding:14}}>
                          <div style={{fontSize:9, color:"#f59e0b", letterSpacing:0.5, marginBottom:10}}>⚠ HOLD — LAB TEST REQUIRED BEFORE PLACEMENT</div>
                          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
                            {hold.map(t=>(
                              <div key={t} style={{padding:"8px 16px", borderRadius:8, background:"#f59e0b33", color:"#f59e0b", fontWeight:900, fontSize:14, border:"1px solid #f59e0b55"}}>
                                TYPE {t}
                                <div style={{fontSize:9, fontWeight:400, marginTop:2}}>{TYPE_LABELS[t]}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* ── Field Reject ── */}
                      {rejected.length > 0 && (
                        <div style={{background:"#2a0f0f", border:"1px solid #3b0000", borderRadius:12, padding:14}}>
                          <div style={{fontSize:9, color:"#991b1b", letterSpacing:0.5, marginBottom:10}}>✗ DOES NOT APPEAR TO MEET REQUIREMENTS</div>
                          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
                            {rejected.map(t=>(
                              <div key={t} style={{padding:"8px 16px", borderRadius:8, background:"#1f2937", color:"#64748b", fontWeight:900, fontSize:14}}>
                                TYPE {t}
                                <div style={{fontSize:9, fontWeight:400, marginTop:2}}>{TYPE_LABELS[t]}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* ── AI Reasoning ── */}
                      <div style={{background:"#0a1020", border:"1px solid #334155", borderRadius:12, padding:14}}>
                        <div style={{fontSize:9, color:"#94a3b8", letterSpacing:0.3, marginBottom:6}}>AI REASONING</div>
                        <div style={{fontSize:11, color:"#64748b", lineHeight:1.7}}>
                          {visionResult.reasoning}
                        </div>
                      </div>

                      {/* ── Likely AASHTO Class (single) ── */}
                      {(()=>{
                        const aashto = inferAASHTO(visionResult.estimatedFinesContent, visionResult.plasticityIndicators, visionResult.visualObservations);
                        const rating = AASHTO_RATINGS[aashto]||"";
                        const isGood = ["A-1-a","A-1-b","A-3","A-2-4","A-2-5"].includes(aashto);
                        const isFair = ["A-2-6","A-2-7","A-4","A-5"].includes(aashto);
                        const color  = isGood?"#10b981":isFair?"#f59e0b":"#ef4444";
                        const bg     = isGood?"#0a3728":isFair?"#271c00":"#2a0f0f";
                        const border = isGood?"#0f5c3c":isFair?"#a45c0a":"#991b1b";
                        return (
                          <div style={{background:bg, border:`2px solid ${border}`, borderRadius:12, padding:14}}>
                            <div style={{fontSize:9, color, letterSpacing:0.5, marginBottom:8}}>LIKELY AASHTO CLASSIFICATION</div>
                            <div style={{display:"flex", alignItems:"center", gap:14, marginBottom:10}}>
                              <div style={{fontSize:32, fontWeight:900, color, letterSpacing:0}}>{aashto}</div>
                              <div style={{fontSize:11, color:"#94a3b8", lineHeight:1.6}}>{rating}</div>
                            </div>
                            {/* T99 Proctor estimate */}
                            {(()=>{
                              const p = getProctor(aashto);
                              if(!p) return null;
                              return (
                                <div style={{borderTop:`1px solid ${border}`, paddingTop:10, marginTop:2}}>
                                  <div style={{fontSize:9, color:"#f59e0b", letterSpacing:0.5, marginBottom:8}}>
                                    EST. T99 STANDARD PROCTOR (AASHTO T 99)
                                  </div>
                                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8}}>
                                    <div style={{background:"rgba(0,0,0,0.3)", borderRadius:8, padding:"8px 10px", border:"1px solid #334155"}}>

                <span style={{color:"#64748b"}}>2.</span> Open <span style={{color:"#94a3b8"}}>Google Drive</span> and upload that file to a folder like <span style={{color:"#94a3b8", fontStyle:"italic"}}>DelDOT / Borrow Database</span><br/>

const manifestBlob = new Blob([JSON.stringify(manifestData)], {type:"application/json"});
const manifestURL  = URL.createObjectURL(manifestBlob);
const manifestLink = document.createElement("link");
manifestLink.rel  = "manifest";
manifestLink.href = manifestURL;
document.head.appendChild(manifestLink);

// ── Service Worker — caches app for offline use ───────────────────────────────
if("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "deldot-borrow-v1";
    const URLS  = [
      "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
    ];
    self.addEventListener("install", e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting()));
    });
    self.addEventListener("activate", e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener("fetch", e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], {type:"application/javascript"});
  const swURL  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL)
    .then(() => console.log("DelDOT Borrow Classifier: Service worker registered"))
    .catch(e => console.log("SW registration failed:", e));
}
</script>
